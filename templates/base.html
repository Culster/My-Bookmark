<!DOCTYPE html>
<html>
    <head>
        <title>My Bookmark</title>
        <style>
            body {
                display: grid;
                grid-template-rows: auto auto auto;
                gap: 5px;
                background-color: rgb(255, 247, 229);
                font-family: sans-serif;
                color: rgb(209, 209, 209);
                margin: 5px;
            }
            #header {
                display: grid;
                grid-template-columns: 70% auto;
                background-color: rgb(77, 41, 0);
                align-items: center;
                margin: 5px
            }
            #webtitle {
                padding: 10px;
            }
            #webnav {
                display: grid;
                grid-template-columns: auto auto auto;
                padding: 10px;
            }
            #content {
                display: grid;
                grid-template-columns: 20% auto;
                margin: 5px
            }
            #contentnav {
                display: grid;
                grid-template-rows: min-content 25pt;
                background-color: rgb(77, 41, 0);
                padding: 10px;
                margin-right: 5px;
            }
            #contentcategories {
                min-height: 350px;
            }
            #contentpart {
                display: grid;
                grid-template-rows: max-content auto;
            }
            #contentpath {
                color: rgb(77, 41, 0);
                font-family: 'Courier New', Courier, monospace;
            }
            #contentpath a {
                color: rgb(77, 41, 0);
            }
            #contentinside {
                background-color: rgb(77, 41, 0);
                padding: 10px;
                padding-top: 20px;
                padding-bottom: 20px;
            }
            #copyright {
                background-color: rgb(77, 41, 0);
                margin: 5px;
                text-align: right;
                padding-right: 15px;
            }
            a {
                text-decoration: none;
                font-family: 'Courier New', Courier, monospace;
                color: rgb(209, 209, 209);
            }
            textarea {
                resize: none;
            }
        </style>
    </head>
    <body>
        <div id="header">
            <div id="webtitle">
                <h1><a href="{{url_for('home')}}">My Bookmark</a></h1>
            </div>
            <div id="webnav">
                <div><a href="{{url_for('home')}}">Home</a></div>
                <div><a href="{{url_for('about')}}">About</a></div>
                <div><a href="{{url_for('search')}}">Search</a></div>
            </div>
        </div>
        <div id="content">
            {% block forlayouting %}{% endblock %}
        </div>
        <div id="copyright">
            <p>App by <b>Effendy Culster</b></p>
        </div>
    </body>
</html>
